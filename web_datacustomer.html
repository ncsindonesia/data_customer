<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Data Customer</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f6f9;
      padding:30px;
    }

    .container{
      max-width:1400px;
      margin:auto;
      background:#fff;
      padding:25px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    h1{
      margin-bottom:20px;
      color:#2c3e50;
    }

    .search-box{
      margin-bottom:20px;
    }

    .search-box input{
      width:100%;
      padding:14px;
      border:1px solid #ccc;
      border-radius:10px;
      font-size:16px;
    }

    .table-wrapper{
      overflow-x:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1200px;
    }

    thead{
      background:#ffe600;
    }

    th, td{
      border:1px solid #ddd;
      padding:10px;
      text-align:left;
      font-size:14px;
    }

    th{
      color:#000;
    }

    tbody tr:nth-child(even){
      background:#f9f9f9;
    }

    tbody tr:hover{
      background:#eef5ff;
    }

    .loading{
      text-align:center;
      padding:20px;
      color:#666;
    }

    .not-found{
      text-align:center;
      color:red;
      padding:20px;
    }

    @media(max-width:768px){
      body{
        padding:10px;
      }

      .container{
        padding:15px;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <h1>Data Customer</h1>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Cari customer, nama kios, area, telp, dll...">
  </div>

  <div class="table-wrapper">
    <table id="customerTable">
      <thead>
        <tr>
          <th>Customer ID</th>
          <th>Nama Kios</th>
          <th>Nama Pemilik</th>
          <th>Area</th>
          <th>Alamat</th>
          <th>Kabupaten</th>
          <th>Kode Pos</th>
          <th>Telp</th>
        </tr>
      </thead>

      <tbody id="tableBody">
        <tr>
          <td colspan="8" class="loading">Loading data...</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<script>

  // ===============================
  // GANTI DENGAN LINK GOOGLE SHEET JSON
  // ===============================

  const sheetURL = "https://sheets.googleapis.com/v4/spreadsheets/1-gTZWLeXMG0HnBuFQ5E5HcPG5NkIsQ6LIW4UoZY1e3A/values/Data_Customer?key=AIzaSyDHe6KFOCY2GtKR3I1ZzPbD8SbX6P8f4MQ";

  let allData = [];

  async function loadData() {

    try {

      const response = await fetch(sheetURL);
      const data = await response.json();

      // Ambil data rows
      allData = data.values.slice(1);

      renderTable(allData);

    } catch(error) {

      document.getElementById("tableBody").innerHTML = `
        <tr>
          <td colspan="8" class="not-found">
            Gagal mengambil data Google Sheet
          </td>
        </tr>
      `;

      console.log(error);
    }
  }

  function renderTable(data){

    const tableBody = document.getElementById("tableBody");

    if(data.length === 0){
      tableBody.innerHTML = `
        <tr>
          <td colspan="8" class="not-found">
            Data tidak ditemukan
          </td>
        </tr>
      `;
      return;
    }

    tableBody.innerHTML = "";

    data.forEach(row => {

      tableBody.innerHTML += `
        <tr>
          <td>${row[0] || ''}</td>
          <td>${row[1] || ''}</td>
          <td>${row[2] || ''}</td>
          <td>${row[3] || ''}</td>
          <td>${row[4] || ''}</td>
          <td>${row[5] || ''}</td>
          <td>${row[6] || ''}</td>
          <td>${row[7] || ''}</td>
        </tr>
      `;
    });
  }

  // ===============================
  // SEARCH
  // ===============================

  document.getElementById("searchInput").addEventListener("keyup", function(){

    const keyword = this.value.toLowerCase();

    const filtered = allData.filter(row => {

      return row.join(" ").toLowerCase().includes(keyword);

    });

    renderTable(filtered);

  });

  loadData();

</script>

</body>
</html>
